name: Repair Shajara Runtime

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/repair-runtime.yml
      - scaffold/api/database/migrations/**
      - scaffold/api/app/Models/**
      - scaffold/api/app/Services/**
      - scaffold/api/app/Http/Controllers/Api/**
      - scaffold/api/app/Http/Resources/**
      - scaffold/api/routes/api.php

permissions:
  contents: read

concurrency:
  group: shajara-runtime-repair
  cancel-in-progress: true

jobs:
  repair:
    name: Verify imported genealogy and restart Expo
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production

    steps:
      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" | sed 's/\r$//' > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" >/dev/null

      - name: Repair and verify server runtime
        shell: bash
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          APP_PATH: ${{ vars.APP_PATH }}
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -p "$SERVER_PORT" \
            "root@$SERVER_HOST" \
            "APP_PATH='$APP_PATH' bash -s" <<'REMOTE'
          set -euo pipefail

          API_PATH="$APP_PATH/shajara-api"
          MOBILE_PATH="$APP_PATH/shajara-mobile"
          LOG_PATH="$MOBILE_PATH/expo-8083.log"

          test -s "$API_PATH/artisan"
          test -s "$MOBILE_PATH/package.json"

          cd "$API_PATH"
          php artisan optimize:clear
          php artisan migrate --force
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          PEOPLE_COUNT=$(php artisan tinker --execute="echo App\\Models\\Person::count();" 2>/dev/null | tr -cd '0-9')
          PENDING_COUNT=$(php artisan tinker --execute="echo App\\Models\\Person::where('approval_status','pending_supervisor')->count();" 2>/dev/null | tr -cd '0-9')
          CONFIRMED_COUNT=$(php artisan tinker --execute="echo App\\Models\\Person::where('approval_status','supervisor_confirmed')->count();" 2>/dev/null | tr -cd '0-9')

          echo "People: ${PEOPLE_COUNT:-unknown}"
          echo "Confirmed: ${CONFIRMED_COUNT:-unknown}"
          echo "Pending supervisor: ${PENDING_COUNT:-unknown}"

          test -n "${PEOPLE_COUNT:-}" && [ "$PEOPLE_COUNT" -ge 57 ]
          test -n "${CONFIRMED_COUNT:-}" && [ "$CONFIRMED_COUNT" -ge 35 ]
          test -n "${PENDING_COUNT:-}" && [ "$PENDING_COUNT" -ge 22 ]

          STATS_JSON=$(curl -ksS --fail --resolve shajara.pm.sa:443:127.0.0.1 \
            https://shajara.pm.sa/api/v1/stats)
          printf '%s\n' "$STATS_JSON"
          php -r '
            $data = json_decode($argv[1], true);
            if (!is_array($data) || ($data["total"] ?? 0) < 57 || ($data["pending_supervisor"] ?? 0) < 22) {
                fwrite(STDERR, "Imported genealogy totals are missing from the API.\n");
                exit(1);
            }
          ' "$STATS_JSON"

          PEOPLE_JSON=$(curl -ksS --fail --resolve shajara.pm.sa:443:127.0.0.1 \
            'https://shajara.pm.sa/api/v1/people?per_page=250&lineage_status=connected')
          php -r '
            $data = json_decode($argv[1], true);
            $people = [];
            foreach (($data["data"] ?? []) as $person) {
                $people[$person["source_code"] ?? ""] = true;
            }
            foreach (["ALI-FAQIH-HASAN-TURABI", "JAMAL-HASAN-HARUN", "S04-04-U003"] as $code) {
                if (!isset($people[$code])) {
                    fwrite(STDERR, "Connected people API is missing {$code}.\n");
                    exit(1);
                }
            }
          ' "$PEOPLE_JSON"

          pkill -f 'expo start.*8083' >/dev/null 2>&1 || true
          fuser -k 8083/tcp >/dev/null 2>&1 || true
          cd "$MOBILE_PATH"
          printf 'EXPO_PUBLIC_API_URL=https://shajara.pm.sa/api/v1\n' > .env
          : > "$LOG_PATH"
          nohup env CI=1 EXPO_NO_TELEMETRY=1 EXPO_PUBLIC_API_URL='https://shajara.pm.sa/api/v1' \
            npx expo start --host lan --port 8083 --clear > "$LOG_PATH" 2>&1 < /dev/null &

          for _ in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:8083/status | grep -qi running; then
              echo 'Imported genealogy is published and Expo Metro is ready on port 8083.'
              exit 0
            fi
            sleep 2
          done

          tail -n 120 "$LOG_PATH" || true
          exit 1
          REMOTE
