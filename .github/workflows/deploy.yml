name: Deploy Shajara

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shajara-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        shell: bash
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          SERVER_USER: ${{ vars.SERVER_USER }}
          APP_PATH: ${{ vars.APP_PATH }}
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          for name in SERVER_HOST SERVER_PORT SERVER_USER APP_PATH SSH_PRIVATE_KEY_B64 SSH_KNOWN_HOSTS; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required production value: $name"
              exit 1
            fi
          done

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" | sed 's/\r$//' > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" > /dev/null

      - name: Prepare application directory
        shell: bash
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          SERVER_USER: ${{ vars.SERVER_USER }}
          APP_PATH: ${{ vars.APP_PATH }}
        run: |
          set -euo pipefail
          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            "mkdir -p '$APP_PATH'"

      - name: Upload application to requested path
        shell: bash
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          SERVER_USER: ${{ vars.SERVER_USER }}
          APP_PATH: ${{ vars.APP_PATH }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='node_modules/' \
            -e "ssh -i $HOME/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=yes -p $SERVER_PORT" \
            ./ \
            "$SERVER_USER@$SERVER_HOST:$APP_PATH/"

      - name: Link cPanel document root to requested path
        shell: bash
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          SERVER_USER: ${{ vars.SERVER_USER }}
          APP_PATH: ${{ vars.APP_PATH }}
          WEB_ROOT: /mnt/home-storage/home/pmsa/public_html/apps/shajara
        run: |
          set -euo pipefail
          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            "set -e; \
             chown -R pmsa:pmsa '$APP_PATH'; \
             find '$APP_PATH' -type d -exec chmod 0755 {} +; \
             find '$APP_PATH' -type f -exec chmod 0644 {} +; \
             mkdir -p \"\$(dirname '$WEB_ROOT')\"; \
             if [ -L '$WEB_ROOT' ]; then rm -f '$WEB_ROOT'; \
             elif [ -e '$WEB_ROOT' ]; then mv '$WEB_ROOT' \"${WEB_ROOT}.backup.\$(date +%Y%m%d%H%M%S)\"; fi; \
             ln -s '$APP_PATH' '$WEB_ROOT'; \
             chown -h pmsa:pmsa '$WEB_ROOT'"

      - name: Verify deployment
        shell: bash
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          SERVER_USER: ${{ vars.SERVER_USER }}
          APP_PATH: ${{ vars.APP_PATH }}
          WEB_ROOT: /mnt/home-storage/home/pmsa/public_html/apps/shajara
        run: |
          set -euo pipefail
          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            "test -s '$APP_PATH/index.html' && test -L '$WEB_ROOT' && test \"\$(readlink -f '$WEB_ROOT')\" = \"\$(readlink -f '$APP_PATH')\" && test -s '$WEB_ROOT/assets/app.js' && echo 'Deployment verified: project lives at $APP_PATH'"
