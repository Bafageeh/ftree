name: Publish Shajara Android APK

on:
  workflow_run:
    workflows:
      - Build Shajara Android APK
    types:
      - completed

permissions:
  actions: read
  contents: write

concurrency:
  group: shajara-android-apk-publish
  cancel-in-progress: true

jobs:
  publish-apk:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: Shajara-Android-Release-APK
          path: apk
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Verify downloaded APK
        shell: bash
        run: |
          set -euo pipefail
          test -s apk/Shajara-Android-Release.apk
          test -s apk/Shajara-Android-Release.apk.sha256
          (cd apk && sha256sum -c Shajara-Android-Release.apk.sha256)
          printf '%s\n' \
            'Version: 1.0.7 (8)' \
            "Published: $(date --iso-8601=seconds)" \
            'Includes: mobile number, birth date, death date, and deceased-only tree badge' \
            > apk/Shajara-Android-Release.version.txt

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" | sed 's/\r$//' > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" >/dev/null

      - name: Publish APK to shajara.pm.sa
        shell: bash
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          APP_PATH: ${{ vars.APP_PATH }}
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "$SERVER_PORT" \
            "root@$SERVER_HOST" \
            "mkdir -p '$APP_PATH/shajara-api/public/downloads' && chown -R pmsa:pmsa '$APP_PATH/shajara-api/public/downloads'"

          rsync -az \
            -e "ssh -i $HOME/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=yes -p $SERVER_PORT" \
            apk/Shajara-Android-Release.apk \
            apk/Shajara-Android-Release.apk.sha256 \
            apk/Shajara-Android-Release.version.txt \
            "root@$SERVER_HOST:$APP_PATH/shajara-api/public/downloads/"

          ssh -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "$SERVER_PORT" \
            "root@$SERVER_HOST" \
            "chown pmsa:pmsa '$APP_PATH/shajara-api/public/downloads/'* && chmod 644 '$APP_PATH/shajara-api/public/downloads/'*"

          curl -ksS --fail --retry 5 --retry-delay 3 \
            https://shajara.pm.sa/downloads/Shajara-Android-Release.version.txt

      - name: Record successful APK publication
        shell: bash
        run: |
          set -euo pipefail
          cp apk/Shajara-Android-Release.version.txt .github/latest-apk.txt
          printf 'Download: https://shajara.pm.sa/downloads/Shajara-Android-Release.apk\n' >> .github/latest-apk.txt
          printf 'SHA256: ' >> .github/latest-apk.txt
          cut -d' ' -f1 apk/Shajara-Android-Release.apk.sha256 >> .github/latest-apk.txt

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/latest-apk.txt

          if git diff --cached --quiet; then
            echo 'APK publication marker already current.'
            exit 0
          fi

          git commit -m 'Publish Shajara Android APK 1.0.7'
          git push origin HEAD:main
