name: Build Shajara Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/apk-build-request.txt

permissions:
  contents: read

concurrency:
  group: shajara-android-apk
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build standalone Android release APK
    runs-on: ubuntu-latest
    timeout-minutes: 75

    env:
      EXPO_PUBLIC_API_URL: https://shajara.pm.sa/api/v1
      CI: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create Expo SDK 57 project
        shell: bash
        run: |
          set -euo pipefail
          npx create-expo-app@latest shajara-mobile --template default@sdk-57 --yes
          rm -rf shajara-mobile/app shajara-mobile/src
          mkdir -p shajara-mobile/app shajara-mobile/src
          cp -a scaffold/mobile/app/. shajara-mobile/app/
          cp -a scaffold/mobile/src/. shajara-mobile/src/
          cp scaffold/mobile/app.json shajara-mobile/app.json

      - name: Bundle the latest genealogy snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p shajara-mobile/src/generated

          # The current shajara.pm.sa certificate is self-signed. This bypass is
          # restricted to the CI snapshot download; the application still uses HTTPS.
          ready=0
          for attempt in $(seq 1 36); do
            echo "Snapshot attempt $attempt/36"
            rm -f people.json edges.json

            if curl --insecure -fsSL --retry 2 --connect-timeout 15 --max-time 45 \
              'https://shajara.pm.sa/api/v1/people?per_page=250' -o people.json \
              && curl --insecure -fsSL --retry 2 --connect-timeout 15 --max-time 45 \
              'https://shajara.pm.sa/api/v1/chart-edges?per_page=250' -o edges.json; then
              if node <<'NODE'
          const fs = require('fs');

          const peoplePayload = JSON.parse(fs.readFileSync('people.json', 'utf8'));
          const edgesPayload = JSON.parse(fs.readFileSync('edges.json', 'utf8'));
          const people = Array.isArray(peoplePayload.data) ? peoplePayload.data : [];
          const edges = Array.isArray(edgesPayload.data) ? edgesPayload.data : [];

          if (people.length < 238 || edges.length < 9) {
            console.error(`Snapshot incomplete: people=${people.length}, edges=${edges.length}`);
            process.exit(1);
          }

          const peopleContent = `import type { Person } from '../types';\n\n` +
            `// مولدة تلقائيًا من API شجرة النسب أثناء بناء APK.\n` +
            `export const bundledPeople = ${JSON.stringify(people, null, 2)} as unknown as Person[];\n`;

          const edgesContent = `import type { ChartEdge } from '../types';\n\n` +
            `// مولدة تلقائيًا من API شجرة النسب أثناء بناء APK.\n` +
            `export const bundledEdges = ${JSON.stringify(edges, null, 2)} as unknown as ChartEdge[];\n`;

          fs.writeFileSync('shajara-mobile/src/generated/bundledPeople.ts', peopleContent);
          fs.writeFileSync('shajara-mobile/src/generated/bundledEdges.ts', edgesContent);
          console.log(`Bundled snapshot: people=${people.length}, edges=${edges.length}`);
          NODE
              then
                ready=1
                break
              fi
            fi

            sleep 20
          done

          [ "$ready" -eq 1 ] || { echo 'The latest genealogy snapshot was not ready.' >&2; exit 1; }

          python3 - <<'PY'
          from pathlib import Path

          path = Path('shajara-mobile/src/lib/api.ts')
          text = path.read_text()
          people_import = "import { bundledPeople } from '../generated/bundledPeople';"
          edge_import = "import { bundledEdges } from '../generated/bundledEdges';"
          if edge_import not in text:
              text = text.replace(people_import, people_import + "\n" + edge_import)

          text = text.replace(
              'const fallbackChartEdges: ChartEdge[] = [',
              'const staticFallbackChartEdges: ChartEdge[] = [',
              1,
          )
          marker = '\n];\n\nconst fallbackChartEdgeStats: ChartEdgeStats = {'
          replacement = (
              '\n];\n\n'
              'const fallbackChartEdges: ChartEdge[] = bundledEdges.length >= staticFallbackChartEdges.length '
              '? bundledEdges : staticFallbackChartEdges;\n\n'
              'const fallbackChartEdgeStats: ChartEdgeStats = {'
          )
          if 'const fallbackChartEdges: ChartEdge[] = bundledEdges.length' not in text:
              if marker not in text:
                  raise SystemExit('Could not patch chart-edge fallback in api.ts')
              text = text.replace(marker, replacement, 1)

          path.write_text(text)
          PY

          grep -q 'bundledPeople' shajara-mobile/src/generated/bundledPeople.ts
          grep -q 'bundledEdges' shajara-mobile/src/generated/bundledEdges.ts

      - name: Install Expo dependencies
        working-directory: shajara-mobile
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npx expo install \
            @expo/vector-icons \
            expo-constants \
            expo-router \
            react-native-safe-area-context \
            react-dom \
            react-native-web \
            @expo/metro-runtime
          npx expo install --fix
          npx tsc --noEmit

      - name: Generate native Android project
        working-directory: shajara-mobile
        shell: bash
        run: |
          set -euo pipefail
          npx expo prebuild --platform android --clean
          test -s android/gradle/wrapper/gradle-wrapper.properties
          test -s android/gradlew

          python3 - <<'PY'
          from pathlib import Path

          path = Path('android/app/build.gradle')
          text = path.read_text()
          marker = 'release {'
          start = text.find(marker)
          if start < 0:
              raise SystemExit('Could not find the Android release build type.')

          brace = text.find('{', start)
          depth = 0
          end = None
          for index in range(brace, len(text)):
              if text[index] == '{':
                  depth += 1
              elif text[index] == '}':
                  depth -= 1
                  if depth == 0:
                      end = index
                      break

          if end is None:
              raise SystemExit('Could not parse the Android release build type.')

          block = text[brace:end]
          if 'signingConfig' not in block:
              insertion = '\n            signingConfig signingConfigs.debug'
              text = text[:brace + 1] + insertion + text[brace + 1:]
              path.write_text(text)
          PY

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Build standalone release APK
        working-directory: shajara-mobile/android
        shell: bash
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify and prepare APK artifact
        shell: bash
        run: |
          set -euo pipefail
          APK_SOURCE='shajara-mobile/android/app/build/outputs/apk/release/app-release.apk'
          test -s "$APK_SOURCE"

          unzip -l "$APK_SOURCE" | tee apk-contents.txt
          grep -q 'assets/index.android.bundle' apk-contents.txt

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --verbose "$APK_SOURCE"

          cp "$APK_SOURCE" Shajara-Android-Release.apk
          ls -lh Shajara-Android-Release.apk
          sha256sum Shajara-Android-Release.apk > Shajara-Android-Release.apk.sha256

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: Shajara-Android-Release-APK
          path: |
            Shajara-Android-Release.apk
            Shajara-Android-Release.apk.sha256
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
