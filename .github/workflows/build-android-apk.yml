name: Build Shajara Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/apk-build-request.txt
      - .github/workflows/build-android-apk.yml
      - scripts/bundle-genealogy-snapshot.js

permissions:
  contents: read

concurrency:
  group: shajara-android-apk
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build standalone Android release APK
    runs-on: ubuntu-latest
    timeout-minutes: 75

    env:
      EXPO_PUBLIC_API_URL: https://shajara.pm.sa/api/v1
      CI: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create Expo SDK 57 project
        shell: bash
        run: |
          set -euo pipefail
          npx create-expo-app@latest shajara-mobile --template default@sdk-57 --yes
          rm -rf shajara-mobile/app shajara-mobile/src shajara-mobile/scripts
          mkdir -p shajara-mobile/app shajara-mobile/src shajara-mobile/scripts shajara-mobile/assets
          cp -a scaffold/mobile/app/. shajara-mobile/app/
          cp -a scaffold/mobile/src/. shajara-mobile/src/
          cp -a scaffold/mobile/scripts/. shajara-mobile/scripts/
          cp scaffold/mobile/app.json shajara-mobile/app.json

      - name: Bundle the latest genealogy snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p shajara-mobile/src/generated

          ready=0
          for attempt in $(seq 1 36); do
            echo "Snapshot attempt $attempt/36"
            rm -f people.json edges.json

            if curl --insecure -fsSL --retry 2 --connect-timeout 15 --max-time 45 \
              'https://shajara.pm.sa/api/v1/people?per_page=250' -o people.json \
              && curl --insecure -fsSL --retry 2 --connect-timeout 15 --max-time 45 \
              'https://shajara.pm.sa/api/v1/chart-edges?per_page=250' -o edges.json; then
              if node scripts/bundle-genealogy-snapshot.js \
                people.json \
                edges.json \
                shajara-mobile/src/generated; then
                ready=1
                break
              fi
            fi

            sleep 20
          done

          [ "$ready" -eq 1 ] || { echo 'The latest genealogy snapshot was not ready.' >&2; exit 1; }

          python3 - <<'PY'
          from pathlib import Path

          path = Path('shajara-mobile/src/lib/api.ts')
          text = path.read_text()
          people_import = "import { bundledPeople } from '../generated/bundledPeople';"
          edge_import = "import { bundledEdges } from '../generated/bundledEdges';"

          if edge_import not in text:
              if people_import not in text:
                  raise SystemExit('Could not find bundledPeople import in api.ts')
              text = text.replace(people_import, people_import + "\n" + edge_import, 1)

          old_fallback = 'const fallbackChartEdges = filterChartEdgesByPeople(rawFallbackChartEdges, fallbackPeople);'
          new_fallback = (
              'const staticFallbackChartEdges = filterChartEdgesByPeople(rawFallbackChartEdges, fallbackPeople);\n'
              'const fallbackChartEdges = bundledEdges.length > staticFallbackChartEdges.length '
              '? bundledEdges : staticFallbackChartEdges;'
          )

          if new_fallback not in text:
              if old_fallback not in text:
                  raise SystemExit('Could not find current chart-edge fallback declaration in api.ts')
              text = text.replace(old_fallback, new_fallback, 1)

          path.write_text(text)
          PY

          grep -q 'bundledPeople' shajara-mobile/src/generated/bundledPeople.ts
          grep -q 'bundledEdges' shajara-mobile/src/generated/bundledEdges.ts
          grep -q "import { bundledEdges }" shajara-mobile/src/lib/api.ts
          grep -q 'staticFallbackChartEdges' shajara-mobile/src/lib/api.ts

      - name: Install Expo dependencies and verify crash fix
        working-directory: shajara-mobile
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npx expo install \
            @expo/vector-icons \
            expo-constants \
            expo-router \
            expo-image-picker \
            react-native-safe-area-context \
            react-native-svg \
            react-dom \
            react-native-web \
            @expo/metro-runtime
          npx expo install --fix
          npm install --no-save --no-audit --no-fund sharp
          node scripts/generate-shajara-icon.js assets
          test -s assets/icon.png
          test -s assets/adaptive-icon.png
          test -s assets/splash-icon.png
          test -s assets/favicon.png

          python3 - <<'PY'
          from pathlib import Path
          import re

          targets = [
              (
                  Path('src/components/CompletePropheticTree.tsx'),
                  re.compile(r'const children\s*=\s*childrenByParent\.get\(current\.id\) \?\? \[\];'),
                  'const children: Person[] = childrenByParent.get(current.id) ?? [];',
              ),
              (
                  Path('src/components/ZoomableSvgGenealogyTree.tsx'),
                  re.compile(
                      r'const children\s*=\s*\(childrenByParent\.get\(current\.id\) \?\? \[\]\)'
                      r'\.filter\(\(child\) => allowedIds\.has\(child\.id\)\);'
                  ),
                  'const children: Person[] = (childrenByParent.get(current.id) ?? []).filter((child: Person) => allowedIds.has(child.id));',
              ),
          ]

          for path, pattern, replacement in targets:
              text = path.read_text()
              if 'const children: Person[]' not in text:
                  text, count = pattern.subn(replacement, text, count=1)
                  if count != 1:
                      raise SystemExit(f'Could not add TypeScript annotation in {path}')
                  path.write_text(text)
              print(f'Type annotation verified: {path}')
          PY

          grep -Fq 'const children: Person[]' src/components/CompletePropheticTree.tsx
          grep -Fq 'const children: Person[]' src/components/ZoomableSvgGenealogyTree.tsx
          grep -Fq 'collectFocusedExpandedIds' src/components/svg-tree/treeWindow.ts
          grep -Fq 'maxWindowNodes = 60' src/components/LineageAwareSvgGenealogyTree.tsx
          grep -Fq "setQuery('')" src/components/LineageAwareSvgGenealogyTree.tsx
          grep -Fq 'TreeErrorBoundary' src/components/GenealogyTree.tsx
          grep -Fq 'version": "1.0.7"' app.json
          grep -Fq 'versionCode": 8' app.json
          npx tsc --noEmit

      - name: Generate native Android project
        working-directory: shajara-mobile
        shell: bash
        run: |
          set -euo pipefail
          npx expo prebuild --platform android --clean
          test -s android/gradle/wrapper/gradle-wrapper.properties
          test -s android/gradlew

          python3 - <<'PY'
          from pathlib import Path

          path = Path('android/app/build.gradle')
          text = path.read_text()
          marker = 'release {'
          start = text.find(marker)
          if start < 0:
              raise SystemExit('Could not find the Android release build type.')

          brace = text.find('{', start)
          depth = 0
          end = None
          for index in range(brace, len(text)):
              if text[index] == '{':
                  depth += 1
              elif text[index] == '}':
                  depth -= 1
                  if depth == 0:
                      end = index
                      break

          if end is None:
              raise SystemExit('Could not parse the Android release build type.')

          block = text[brace:end]
          if 'signingConfig' not in block:
              insertion = '\n            signingConfig signingConfigs.debug'
              text = text[:brace + 1] + insertion + text[brace + 1:]
              path.write_text(text)
          PY

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Build standalone release APK
        working-directory: shajara-mobile/android
        shell: bash
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify and prepare APK artifact
        shell: bash
        run: |
          set -euo pipefail
          APK_SOURCE='shajara-mobile/android/app/build/outputs/apk/release/app-release.apk'
          test -s "$APK_SOURCE"

          unzip -l "$APK_SOURCE" | tee apk-contents.txt
          grep -q 'assets/index.android.bundle' apk-contents.txt

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --verbose "$APK_SOURCE"

          cp "$APK_SOURCE" Shajara-Android-Release.apk
          ls -lh Shajara-Android-Release.apk
          sha256sum Shajara-Android-Release.apk > Shajara-Android-Release.apk.sha256

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: Shajara-Android-Release-APK
          path: |
            Shajara-Android-Release.apk
            Shajara-Android-Release.apk.sha256
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
