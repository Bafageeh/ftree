name: Build Shajara Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shajara-android-apk
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build standalone Android release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      EXPO_PUBLIC_API_URL: https://pm.sa/apps/shajara/api/v1
      CI: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create Expo SDK 57 project
        shell: bash
        run: |
          set -euo pipefail
          npx create-expo-app@latest shajara-mobile --template default@sdk-57 --yes
          rm -rf shajara-mobile/app shajara-mobile/src
          mkdir -p shajara-mobile/app shajara-mobile/src
          cp -a scaffold/mobile/app/. shajara-mobile/app/
          cp -a scaffold/mobile/src/. shajara-mobile/src/
          cp scaffold/mobile/app.json shajara-mobile/app.json

      - name: Install Expo dependencies
        working-directory: shajara-mobile
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npx expo install \
            @expo/vector-icons \
            expo-constants \
            expo-router \
            react-native-safe-area-context \
            react-dom \
            react-native-web \
            @expo/metro-runtime
          npx expo install --fix
          npx tsc --noEmit

      - name: Generate native Android project
        working-directory: shajara-mobile
        shell: bash
        run: |
          set -euo pipefail
          npx expo prebuild --platform android --clean
          test -s android/gradle/wrapper/gradle-wrapper.properties
          test -s android/gradlew

          python3 - <<'PY'
          from pathlib import Path

          path = Path('android/app/build.gradle')
          text = path.read_text()
          marker = 'release {'
          start = text.find(marker)
          if start < 0:
              raise SystemExit('Could not find the Android release build type.')

          brace = text.find('{', start)
          depth = 0
          end = None
          for index in range(brace, len(text)):
              if text[index] == '{':
                  depth += 1
              elif text[index] == '}':
                  depth -= 1
                  if depth == 0:
                      end = index
                      break

          if end is None:
              raise SystemExit('Could not parse the Android release build type.')

          block = text[brace:end]
          if 'signingConfig' not in block:
              insertion = '\n            signingConfig signingConfigs.debug'
              text = text[:brace + 1] + insertion + text[brace + 1:]
              path.write_text(text)
          PY

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Build standalone release APK
        working-directory: shajara-mobile/android
        shell: bash
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify and prepare APK artifact
        shell: bash
        run: |
          set -euo pipefail
          APK_SOURCE='shajara-mobile/android/app/build/outputs/apk/release/app-release.apk'
          test -s "$APK_SOURCE"

          unzip -l "$APK_SOURCE" | tee apk-contents.txt
          grep -q 'assets/index.android.bundle' apk-contents.txt

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --verbose "$APK_SOURCE"

          cp "$APK_SOURCE" Shajara-Android-Release.apk
          ls -lh Shajara-Android-Release.apk
          sha256sum Shajara-Android-Release.apk > Shajara-Android-Release.apk.sha256

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: Shajara-Android-Release-APK
          path: |
            Shajara-Android-Release.apk
            Shajara-Android-Release.apk.sha256
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
