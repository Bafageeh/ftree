name: Deploy Shajara API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-api.yml
      - scaffold/api/**

permissions:
  contents: read

concurrency:
  group: shajara-api-production
  cancel-in-progress: true

jobs:
  deploy-api:
    name: Deploy Laravel API only
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" | sed 's/\r$//' > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" >/dev/null

      - name: Upload API files
        shell: bash
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          APP_PATH: ${{ vars.APP_PATH }}
        run: |
          set -euo pipefail
          rsync -az \
            -e "ssh -i $HOME/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=yes -p $SERVER_PORT" \
            scaffold/api/ \
            "root@$SERVER_HOST:$APP_PATH/shajara-api/"

      - name: Apply and verify API update
        shell: bash
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          APP_PATH: ${{ vars.APP_PATH }}
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -p "$SERVER_PORT" \
            "root@$SERVER_HOST" \
            "APP_PATH='$APP_PATH' bash -s" <<'REMOTE'
          set -euo pipefail

          API_PATH="$APP_PATH/shajara-api"
          test -s "$API_PATH/artisan"
          cd "$API_PATH"

          COMPOSER_BIN="$(command -v composer || true)"
          if [[ -z "$COMPOSER_BIN" && -x /opt/cpanel/composer/bin/composer ]]; then
            COMPOSER_BIN=/opt/cpanel/composer/bin/composer
          fi
          test -n "$COMPOSER_BIN"

          "$COMPOSER_BIN" install --no-dev --no-interaction --prefer-dist --optimize-autoloader
          php artisan optimize:clear
          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan route:list --path=api/v1
          php artisan route:list --name=lineage

          chown -R pmsa:pmsa "$API_PATH"
          chmod -R ug+rwX "$API_PATH/storage" "$API_PATH/bootstrap/cache"

          HEALTH_JSON=$(curl -ksS --fail --resolve shajara.pm.sa:443:127.0.0.1 https://shajara.pm.sa/api/v1/health)
          STATS_JSON=$(curl -ksS --fail --resolve shajara.pm.sa:443:127.0.0.1 https://shajara.pm.sa/api/v1/stats)
          PEOPLE_JSON=$(curl -ksS --fail --resolve shajara.pm.sa:443:127.0.0.1 'https://shajara.pm.sa/api/v1/people?per_page=250&lineage_status=connected')
          LINEAGE_HTML=$(curl -ksS --fail --resolve shajara.pm.sa:443:127.0.0.1 https://shajara.pm.sa/lineage)
          GAPS_STATUS=$(curl -ksS -o /dev/null -w '%{http_code}' --resolve shajara.pm.sa:443:127.0.0.1 https://shajara.pm.sa/api/v1/lineage-gaps)

          php -r '
            $health = json_decode($argv[1], true);
            $stats = json_decode($argv[2], true);
            $peoplePayload = json_decode($argv[3], true);
            if (!is_array($health)) {
                fwrite(STDERR, "Health endpoint returned invalid JSON.\n");
                exit(1);
            }
            if (!is_array($stats) || ($stats["total"] ?? -1) !== ($stats["connected_to_prophet"] ?? -2)) {
                fwrite(STDERR, "Published totals include a lineage not connected to the Prophet.\n");
                exit(1);
            }
            if (($stats["disconnected_from_prophet"] ?? -1) !== 0) {
                fwrite(STDERR, "Disconnected lineage count must be zero.\n");
                exit(1);
            }
            if (!is_array($peoplePayload) || !isset($peoplePayload["data"]) || count($peoplePayload["data"]) > ($stats["total"] ?? 0)) {
                fwrite(STDERR, "People endpoint is inconsistent with connected lineage totals.\n");
                exit(1);
            }

            $people = [];
            foreach ($peoplePayload["data"] as $person) {
                $people[$person["source_code"] ?? ""] = $person;
            }

            $required = [
                "CORE-016" => ["name" => "محمد صاحب مرباط", "children" => ["CORE-017", "MIRBAT-ALAWI-001"]],
                "CORE-018" => ["name" => "محمد الفقيه المقدم", "children" => ["CORE-019", "CORE-022", "CORE-023", "CORE-024"]],
                "CORE-019" => ["name" => "علوي بن محمد الفقيه المقدم", "children" => ["CORE-020", "CORE-021"]],
            ];

            foreach ($required as $parentCode => $definition) {
                if (!isset($people[$parentCode]) || ($people[$parentCode]["full_name"] ?? null) !== $definition["name"]) {
                    fwrite(STDERR, "Missing or incorrectly named parent {$parentCode}.\n");
                    exit(1);
                }
                $parentId = $people[$parentCode]["id"];
                foreach ($definition["children"] as $childCode) {
                    if (!isset($people[$childCode]) || ($people[$childCode]["lineage_parent_id"] ?? null) !== $parentId) {
                        fwrite(STDERR, "{$childCode} is not stored as a child of {$parentCode}.\n");
                        exit(1);
                    }
                }
            }
          ' "$HEALTH_JSON" "$STATS_JSON" "$PEOPLE_JSON"

          test "$GAPS_STATUS" = "404"
          printf '%s' "$LINEAGE_HTML" | grep -q 'شجرة النسب المتصلة بسيد البشر محمد'
          printf '%s' "$LINEAGE_HTML" | grep -q 'أُلغي من الشجرة العامة كل اسم أو فرع لا يصل ترابطه'
          echo 'Shajara API deployed with the verified branched children tree.'
          REMOTE
