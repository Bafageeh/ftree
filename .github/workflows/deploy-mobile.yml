name: Deploy Shajara Mobile

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-mobile.yml
      - scaffold/mobile/**

permissions:
  contents: read

concurrency:
  group: shajara-mobile-production
  cancel-in-progress: true

jobs:
  deploy-mobile:
    name: Deploy mobile source and restart Expo
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" | sed 's/\r$//' > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" >/dev/null

      - name: Upload mobile source
        shell: bash
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          APP_PATH: ${{ vars.APP_PATH }}
        run: |
          set -euo pipefail
          rsync -az \
            -e "ssh -i $HOME/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=yes -p $SERVER_PORT" \
            scaffold/mobile/ \
            "root@$SERVER_HOST:$APP_PATH/shajara-mobile/"

      - name: Install SVG renderer and restart Expo
        shell: bash
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          APP_PATH: ${{ vars.APP_PATH }}
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -p "$SERVER_PORT" \
            "root@$SERVER_HOST" \
            "APP_PATH='$APP_PATH' bash -s" <<'REMOTE'
          set -euo pipefail

          MOBILE_PATH="$APP_PATH/shajara-mobile"
          LOG_PATH="$MOBILE_PATH/expo-8083.log"
          BUNDLE_FILE="$MOBILE_PATH/src/generated/bundledPeople.ts"
          TREE_ENTRY="$MOBILE_PATH/src/components/GenealogyTree.tsx"
          TREE_FILE="$MOBILE_PATH/src/components/ZoomableSvgGenealogyTree.tsx"
          ZOOM_FILE="$MOBILE_PATH/src/components/svg-tree/TreeZoomToolbar.tsx"
          LAYOUT_FILE="$MOBILE_PATH/src/components/svg-tree/layout.ts"

          test -s "$MOBILE_PATH/package.json"
          test -s "$MOBILE_PATH/app/lineage-gaps.tsx"
          test -s "$BUNDLE_FILE"
          test -s "$TREE_ENTRY"
          test -s "$TREE_FILE"
          test -s "$ZOOM_FILE"
          test -s "$LAYOUT_FILE"
          grep -Fq 'Redirect href="/(tabs)/tree"' "$MOBILE_PATH/app/lineage-gaps.tsx"
          ! grep -Fq "router.push('/lineage-gaps')" "$MOBILE_PATH/app/(tabs)/review.tsx"

          grep -Fq "ZoomableSvgGenealogyTree" "$TREE_ENTRY"
          grep -Fq "from 'react-native-svg'" "$TREE_FILE"
          grep -Fq 'MIN_ZOOM = 0.5' "$TREE_FILE"
          grep -Fq 'MAX_ZOOM = 2' "$TREE_FILE"
          grep -Fq 'TreeZoomToolbar' "$TREE_FILE"
          grep -Fq 'createSvgTreeLayout' "$TREE_FILE"
          grep -Fq 'stroke="url(#branchGradient)"' "$TREE_FILE"
          grep -Fq 'ملاءمة' "$ZOOM_FILE"
          ! grep -Fq 'setLayoutAnimationEnabledExperimental' "$TREE_FILE"

          grep -Fq "core(17, 'علي بن محمد صاحب مرباط', 'CORE-017', 16, 17" "$BUNDLE_FILE"
          grep -Fq "core(1602, 'علوي بن محمد صاحب مرباط', 'MIRBAT-ALAWI-001', 16, 17" "$BUNDLE_FILE"
          grep -Fq "core(19, 'علوي بن محمد الفقيه المقدم', 'CORE-019', 18, 19" "$BUNDLE_FILE"
          grep -Fq "core(22, 'أحمد بن محمد الفقيه المقدم', 'CORE-022', 18, 19" "$BUNDLE_FILE"
          grep -Fq "core(23, 'علي بن محمد الفقيه المقدم', 'CORE-023', 18, 19" "$BUNDLE_FILE"
          grep -Fq "core(24, 'عبد الرحمن بن محمد الفقيه المقدم', 'CORE-024', 18, 19" "$BUNDLE_FILE"
          grep -Fq "core(20, 'علي بن علوي بن محمد الفقيه المقدم', 'CORE-020', 19, 20" "$BUNDLE_FILE"
          grep -Fq "core(21, 'عبد الله بن علوي بن محمد الفقيه المقدم', 'CORE-021', 19, 20" "$BUNDLE_FILE"

          cd "$MOBILE_PATH"
          if [[ ! -d node_modules ]]; then
            npm install --no-audit --no-fund
          fi

          if ! node -e "require.resolve('react-native-svg/package.json')" >/dev/null 2>&1; then
            CI=1 npx expo install react-native-svg
          fi

          node -e "require.resolve('react-native-svg/package.json')" >/dev/null

          pkill -f 'expo start.*8083' >/dev/null 2>&1 || true
          fuser -k 8083/tcp >/dev/null 2>&1 || true
          rm -rf .expo node_modules/.cache
          rm -rf /tmp/metro-* /tmp/haste-map-* 2>/dev/null || true

          : > "$LOG_PATH"
          nohup env CI=1 EXPO_NO_TELEMETRY=1 EXPO_PUBLIC_API_URL='https://shajara.pm.sa/api/v1' \
            npx expo start --host lan --port 8083 --clear > "$LOG_PATH" 2>&1 < /dev/null &

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8083/status 2>/dev/null | grep -qi running; then
              echo 'Shajara Expo restarted with zoomable SVG genealogy renderer.'
              tail -n 30 "$LOG_PATH" || true
              exit 0
            fi
            sleep 2
          done

          tail -n 150 "$LOG_PATH" || true
          exit 1
          REMOTE
