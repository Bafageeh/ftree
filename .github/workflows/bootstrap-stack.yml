name: Bootstrap Laravel and Mobile

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bootstrap-stack.yml
      - scripts/bootstrap-stack.sh
      - scaffold/api/**
      - scaffold/mobile/**

permissions:
  contents: read

concurrency:
  group: shajara-stack-bootstrap
  cancel-in-progress: true

jobs:
  bootstrap:
    name: Build Laravel 13 and Expo SDK 57
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" | sed 's/\r$//' > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" >/dev/null

      - name: Repair Expo SVG dependency immediately
        shell: bash
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          APP_PATH: ${{ vars.APP_PATH }}
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -p "$SERVER_PORT" \
            "root@$SERVER_HOST" \
            "APP_PATH='$APP_PATH' bash -s" <<'REMOTE'
          set -euo pipefail
          MOBILE_PATH="$APP_PATH/shajara-mobile"
          LOG_PATH="$MOBILE_PATH/expo-8083.log"

          test -s "$MOBILE_PATH/package.json"
          cd "$MOBILE_PATH"
          npm install --no-audit --no-fund
          npx expo install react-native-svg
          node -e "console.log(require.resolve('react-native-svg/package.json'))"

          pkill -f 'expo start.*8083' >/dev/null 2>&1 || true
          fuser -k 8083/tcp >/dev/null 2>&1 || true
          rm -rf "$MOBILE_PATH/.expo" "$MOBILE_PATH/node_modules/.cache"
          rm -rf /tmp/metro-* /tmp/haste-map-* 2>/dev/null || true

          : > "$LOG_PATH"
          nohup env CI=1 EXPO_NO_TELEMETRY=1 EXPO_PUBLIC_API_URL='https://shajara.pm.sa/api/v1' \
            npx expo start --host lan --port 8083 --clear > "$LOG_PATH" 2>&1 < /dev/null &

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8083/status 2>/dev/null | grep -qi running; then
              echo 'Expo Metro restarted with react-native-svg installed.'
              tail -n 30 "$LOG_PATH" || true
              exit 0
            fi
            sleep 2
          done

          tail -n 150 "$LOG_PATH" || true
          exit 1
          REMOTE

      - name: Upload scaffolding
        shell: bash
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          APP_PATH: ${{ vars.APP_PATH }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -i $HOME/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=yes -p $SERVER_PORT" \
            scaffold/ \
            "root@$SERVER_HOST:$APP_PATH/scaffold/"

      - name: Create Laravel and mobile projects
        shell: bash
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          APP_PATH: ${{ vars.APP_PATH }}
        run: |
          set -euo pipefail

          cp scripts/bootstrap-stack.sh /tmp/bootstrap-stack-fixed.sh
          python3 - <<'PY'
          from pathlib import Path

          path = Path('/tmp/bootstrap-stack-fixed.sh')
          text = path.read_text()
          text = text.replace(
              'php - "$API_PATH" "$MOBILE_PATH/src/generated/bundledPeople.ts" <<\'PHP\'',
              'API_PATH_ENV="$API_PATH" OUTPUT_PATH_ENV="$MOBILE_PATH/src/generated/bundledPeople.ts" php <<\'PHP\'',
          )
          text = text.replace(
              '$apiPath = $argv[1];\n$outputPath = $argv[2];',
              '$apiPath = getenv(\'API_PATH_ENV\');\n$outputPath = getenv(\'OUTPUT_PATH_ENV\');',
          )
          text = text.replace('count($people) < 220 || $pending < 196', 'count($people) < 238 || $pending < 214')
          if 'php - "$API_PATH"' in text:
              raise SystemExit('Failed to patch PHP stdin invocation.')
          path.write_text(text)
          PY

          ssh -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -p "$SERVER_PORT" \
            "root@$SERVER_HOST" \
            "bash -s -- '$APP_PATH'" < /tmp/bootstrap-stack-fixed.sh

      - name: Verify reviewed genealogy and restart Expo
        shell: bash
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          APP_PATH: ${{ vars.APP_PATH }}
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -p "$SERVER_PORT" \
            "root@$SERVER_HOST" \
            "APP_PATH='$APP_PATH' bash -s" <<'REMOTE'
          set -euo pipefail

          API_PATH="$APP_PATH/shajara-api"
          MOBILE_PATH="$APP_PATH/shajara-mobile"
          LOG_PATH="$MOBILE_PATH/expo-8083.log"

          test -s "$API_PATH/artisan"
          test -s "$MOBILE_PATH/package.json"
          test -s "$MOBILE_PATH/src/generated/bundledPeople.ts"

          cd "$API_PATH"
          PEOPLE_COUNT=$(php artisan tinker --execute="echo App\\Models\\Person::count();" 2>/dev/null | tr -cd '0-9')
          READING_COUNT=$(php artisan tinker --execute="echo App\\Models\\ChartReading::count();" 2>/dev/null | tr -cd '0-9')
          EDGE_COUNT=$(php artisan tinker --execute="echo App\\Models\\ChartEdge::count();" 2>/dev/null | tr -cd '0-9')
          PENDING_COUNT=$(php artisan tinker --execute="echo App\\Models\\Person::where('approval_status','pending_supervisor')->count();" 2>/dev/null | tr -cd '0-9')
          CONFIRMED_COUNT=$(php artisan tinker --execute="echo App\\Models\\Person::where('approval_status','supervisor_confirmed')->count();" 2>/dev/null | tr -cd '0-9')

          echo "People: $PEOPLE_COUNT"
          echo "Chart readings: $READING_COUNT"
          echo "Reviewed chart edges: $EDGE_COUNT"
          echo "Pending supervisor: $PENDING_COUNT"
          echo "Confirmed: $CONFIRMED_COUNT"

          [ "$PEOPLE_COUNT" -ge 238 ]
          [ "$READING_COUNT" -ge 214 ]
          [ "$EDGE_COUNT" -ge 7 ]
          [ "$PENDING_COUNT" -ge 214 ]
          [ "$CONFIRMED_COUNT" -ge 24 ]
          grep -q 'pending_supervisor' "$MOBILE_PATH/src/generated/bundledPeople.ts"
          (cd "$MOBILE_PATH" && node -e "console.log(require.resolve('react-native-svg/package.json'))")

          EDGE_JSON=$(curl -ksS --fail --resolve shajara.pm.sa:443:127.0.0.1 https://shajara.pm.sa/api/v1/chart-edges-stats)
          php -r '
            $data = json_decode($argv[1], true);
            if (!is_array($data) || ($data["total"] ?? 0) < 7) {
                fwrite(STDERR, "Chart edge API is incomplete.\n");
                exit(1);
            }
          ' "$EDGE_JSON"

          pkill -f 'expo start.*8083' >/dev/null 2>&1 || true
          fuser -k 8083/tcp >/dev/null 2>&1 || true
          rm -rf "$MOBILE_PATH/.expo" "$MOBILE_PATH/node_modules/.cache"
          rm -rf /tmp/metro-* /tmp/haste-map-* 2>/dev/null || true

          cd "$MOBILE_PATH"
          : > "$LOG_PATH"
          nohup env CI=1 EXPO_NO_TELEMETRY=1 EXPO_PUBLIC_API_URL='https://shajara.pm.sa/api/v1' \
            npx expo start --host lan --port 8083 --clear > "$LOG_PATH" 2>&1 < /dev/null &

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8083/status 2>/dev/null | grep -qi running; then
              echo 'Expo Metro is ready with reviewed genealogy arrows.'
              tail -n 30 "$LOG_PATH" || true
              exit 0
            fi
            sleep 2
          done

          tail -n 150 "$LOG_PATH" || true
          exit 1
          REMOTE

      - name: Verify stack files
        shell: bash
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          APP_PATH: ${{ vars.APP_PATH }}
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/id_ed25519" -o BatchMode=yes -o StrictHostKeyChecking=yes -p "$SERVER_PORT" "root@$SERVER_HOST" \
            "test -s '$APP_PATH/shajara-api/artisan' && test -s '$APP_PATH/shajara-mobile/package.json' && test -s '$APP_PATH/shajara-api/public/app/index.html' && cat '$APP_PATH/STACK_STATUS.txt'"
